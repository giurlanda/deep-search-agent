name: publish

# Publish to PyPI on tag push (v*), using PyPI Trusted Publishing (OIDC).
# No API token is stored: PyPI must be configured with a trusted publisher for
# this repository/workflow (see README "Publishing"). The `pypi` environment
# gives an extra approval/protection point.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: uv run pytest
      - name: Build sdist and wheel
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/deep-search-agent
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
